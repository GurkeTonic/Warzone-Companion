name: Mirror warzone data

on:
  schedule:
    - cron: "11,41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: warzone-data
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch warzone data
        run: python3 tools/mirror_warzone.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain data)" ]; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: refresh warzone snapshot"
          git pull --rebase origin main
          git push
